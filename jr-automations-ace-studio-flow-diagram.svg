<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="160" y1="60" x2="1440" y2="940" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F0E4"/>
      <stop offset="1" stop-color="#EFE5D3"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FFFDF8"/>
      <stop offset="1" stop-color="#F7F0E4"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0D5C63"/>
      <stop offset="1" stop-color="#154C52"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1600" height="1000" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="20" flood-color="#332B22" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M0 0L14 7L0 14V0Z" fill="#0D5C63"/>
    </marker>
  </defs>

  <rect width="1600" height="1000" rx="40" fill="url(#bg)"/>
  <circle cx="1320" cy="170" r="180" fill="#0D5C63" fill-opacity="0.06"/>
  <circle cx="250" cy="860" r="220" fill="#BF6C52" fill-opacity="0.07"/>

  <text x="120" y="110" fill="#0D5C63" font-family="Georgia, 'Times New Roman', serif" font-size="24" letter-spacing="5">CASE STUDY FLOW</text>
  <text x="120" y="170" fill="#1B1A17" font-family="Georgia, 'Times New Roman', serif" font-size="56" font-weight="700">JR Automations to Ace Studio</text>
  <text x="120" y="228" fill="#1B1A17" font-family="Georgia, 'Times New Roman', serif" font-size="56" font-weight="700">Operating System</text>
  <text x="120" y="286" fill="#5E584F" font-family="Georgia, 'Times New Roman', serif" font-size="27">From repeated business friction to shortcut capture, structured data,</text>
  <text x="120" y="322" fill="#5E584F" font-family="Georgia, 'Times New Roman', serif" font-size="27">and a dashboard-backed decision layer.</text>

  <g filter="url(#shadow)">
    <rect x="120" y="400" width="300" height="360" rx="26" fill="url(#card)" stroke="#D7CDB9" stroke-width="2"/>
    <rect x="460" y="400" width="300" height="360" rx="26" fill="url(#card)" stroke="#D7CDB9" stroke-width="2"/>
    <rect x="800" y="400" width="300" height="360" rx="26" fill="url(#card)" stroke="#D7CDB9" stroke-width="2"/>
    <rect x="1140" y="400" width="300" height="360" rx="26" fill="url(#card)" stroke="#D7CDB9" stroke-width="2"/>
  </g>

  <rect x="150" y="430" width="105" height="34" rx="17" fill="#0D5C63" fill-opacity="0.1"/>
  <text x="175" y="453" fill="#0D5C63" font-family="Arial, sans-serif" font-size="17" font-weight="700">1. INPUT</text>
  <text x="150" y="510" fill="#1B1A17" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="700">Business Need</text>
  <text x="150" y="555" fill="#5E584F" font-family="Arial, sans-serif" font-size="23">JR Ace of Fades needed one</text>
  <text x="150" y="586" fill="#5E584F" font-family="Arial, sans-serif" font-size="23">practical operating layer for</text>
  <text x="150" y="617" fill="#5E584F" font-family="Arial, sans-serif" font-size="23">money, chair rent, stock,</text>
  <text x="150" y="648" fill="#5E584F" font-family="Arial, sans-serif" font-size="23">content, and weekly review.</text>
  <text x="150" y="704" fill="#1B1A17" font-family="Arial, sans-serif" font-size="20" font-weight="700">Pain points</text>
  <text x="150" y="734" fill="#5E584F" font-family="Arial, sans-serif" font-size="20">• Manual checks</text>
  <text x="150" y="762" fill="#5E584F" font-family="Arial, sans-serif" font-size="20">• Scattered notes</text>

  <rect x="490" y="430" width="137" height="34" rx="17" fill="#0D5C63" fill-opacity="0.1"/>
  <text x="515" y="453" fill="#0D5C63" font-family="Arial, sans-serif" font-size="17" font-weight="700">2. CAPTURE</text>
  <text x="490" y="510" fill="#1B1A17" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="700">Shortcut Layer</text>
  <text x="490" y="555" fill="#5E584F" font-family="Arial, sans-serif" font-size="23">Apple Shortcuts turns repeated</text>
  <text x="490" y="586" fill="#5E584F" font-family="Arial, sans-serif" font-size="23">actions into structured inputs</text>
  <text x="490" y="617" fill="#5E584F" font-family="Arial, sans-serif" font-size="23">that can be logged quickly from</text>
  <text x="490" y="648" fill="#5E584F" font-family="Arial, sans-serif" font-size="23">an iPhone in real working use.</text>
  <text x="490" y="704" fill="#1B1A17" font-family="Arial, sans-serif" font-size="20" font-weight="700">Examples</text>
  <text x="490" y="734" fill="#5E584F" font-family="Arial, sans-serif" font-size="20">• Income / expense</text>
  <text x="490" y="762" fill="#5E584F" font-family="Arial, sans-serif" font-size="20">• Stock / weekly review</text>

  <rect x="830" y="430" width="113" height="34" rx="17" fill="#0D5C63" fill-opacity="0.1"/>
  <text x="855" y="453" fill="#0D5C63" font-family="Arial, sans-serif" font-size="17" font-weight="700">3. STORE</text>
  <text x="830" y="510" fill="#1B1A17" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="700">Structured Data</text>
  <text x="830" y="555" fill="#5E584F" font-family="Arial, sans-serif" font-size="23">Shortcuts post JSON into a</text>
  <text x="830" y="586" fill="#5E584F" font-family="Arial, sans-serif" font-size="23">Google Apps Script endpoint,</text>
  <text x="830" y="617" fill="#5E584F" font-family="Arial, sans-serif" font-size="23">which routes entries into the</text>
  <text x="830" y="648" fill="#5E584F" font-family="Arial, sans-serif" font-size="23">correct Google Sheet tabs.</text>
  <text x="830" y="704" fill="#1B1A17" font-family="Arial, sans-serif" font-size="20" font-weight="700">Data model</text>
  <text x="830" y="734" fill="#5E584F" font-family="Arial, sans-serif" font-size="20">• Durable record</text>
  <text x="830" y="762" fill="#5E584F" font-family="Arial, sans-serif" font-size="20">• Reusable for review</text>

  <rect x="1170" y="430" width="144" height="34" rx="17" fill="#0D5C63" fill-opacity="0.1"/>
  <text x="1195" y="453" fill="#0D5C63" font-family="Arial, sans-serif" font-size="17" font-weight="700">4. REVIEW</text>
  <text x="1170" y="510" fill="#1B1A17" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="700">Decision Layer</text>
  <text x="1170" y="555" fill="#5E584F" font-family="Arial, sans-serif" font-size="23">An Apps Script dashboard turns</text>
  <text x="1170" y="586" fill="#5E584F" font-family="Arial, sans-serif" font-size="23">the logged data into a daily</text>
  <text x="1170" y="617" fill="#5E584F" font-family="Arial, sans-serif" font-size="23">command centre for money,</text>
  <text x="1170" y="648" fill="#5E584F" font-family="Arial, sans-serif" font-size="23">stock, priorities, and activity.</text>
  <text x="1170" y="704" fill="#1B1A17" font-family="Arial, sans-serif" font-size="20" font-weight="700">Outcome</text>
  <text x="1170" y="734" fill="#5E584F" font-family="Arial, sans-serif" font-size="20">• Better visibility</text>
  <text x="1170" y="762" fill="#5E584F" font-family="Arial, sans-serif" font-size="20">• Better weekly decisions</text>

  <path d="M420 580H458" stroke="#0D5C63" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M760 580H798" stroke="#0D5C63" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M1100 580H1138" stroke="#0D5C63" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow)"/>

  <rect x="320" y="835" width="960" height="92" rx="24" fill="url(#accent)"/>
  <text x="360" y="887" fill="#FFFDF8" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="700">Why this matters</text>
  <text x="620" y="887" fill="#EAF1F1" font-family="Arial, sans-serif" font-size="24">It shows workflow engineering grounded in real operational use, not a generic automation demo.</text>
</svg>
